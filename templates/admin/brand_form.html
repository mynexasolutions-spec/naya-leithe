{% extends "admin/base.html" %}

{% block content %}
<div class="page-header">
    <h1>Add New Brand</h1>
    <p>Create a new brand for your products.</p>
</div>

<div class="section-card" style="max-width: 600px;">
    <form action="{{ url_for('admin.new_brand') }}" method="POST" enctype="multipart/form-data" class="admin-form">
        <div class="form-group">
            <label>Brand Name</label>
            <input type="text" name="name" placeholder="e.g. Nike, Zara, Handloom India" required>
        </div>
        
        <div class="form-group">
            <label>Brand Logo</label>
            <input type="file" name="logo" accept="image/*">
            <p class="form-hint">Upload a high-quality logo for the brand.</p>
        </div>

        <div class="form-actions" style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Save Brand</button>
            <a href="{{ url_for('admin.brands') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
