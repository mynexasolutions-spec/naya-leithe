{% extends "admin/base.html" %}

{% block content %}
<div class="page-header">
    <h1>Add New Category</h1>
    <p>Create a new category for your store collection.</p>
</div>

<div class="section-card">
    <form action="{{ url_for('admin.new_category') }}" method="POST" enctype="multipart/form-data" class="admin-form">
        <div class="form-grid">
            <div class="form-group">
                <label>Category Name</label>
                <input type="text" name="name" placeholder="e.g. Western Wear" required>
            </div>
            <div class="form-group">
                <label>Category Image</label>
                <input type="file" name="img" accept="image/*" required>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Category</button>
            <a href="{{ url_for('admin.categories') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<style>
    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        margin-bottom: 2rem;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        font-size: 0.9rem;
    }
    .form-group input {
        width: 100%;
        padding: 0.8rem;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        outline: none;
    }
    .btn-secondary {
        background: #f1f5f9;
        color: #1e293b;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 1.5rem;
        border-radius: 10px;
        font-weight: 600;
    }
    input[type="file"] {
        padding: 0.6rem;
        background: #f8fafc;
        cursor: pointer;
    }
</style>
{% endblock %}
