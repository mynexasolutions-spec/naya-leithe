{% extends "admin/base.html" %}

{% block content %}
<div class="page-header">
    <div class="header-content">
        <h1>Create Coupon</h1>
        <p>Define your promotional offer and usage constraints.</p>
    </div>
</div>

<div class="section-card" style="max-width: 800px;">
    <form action="{{ url_for('admin.new_coupon') }}" method="POST" class="admin-form">
        <div class="form-grid">
            <div class="form-group full-width">
                <label>Coupon Name *</label>
                <input type="text" name="code" placeholder="E.G. SAVE20" required style="text-transform: uppercase;">
            </div>

            <div class="form-group">
                <label>Discount Type *</label>
                <select name="type" required>
                    <option value="percentage">Percentage - Discount (%)</option>
                    <option value="flat">Flat Rate — Discount (₹)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Discount Value *</label>
                <input type="number" step="0.01" name="discount" placeholder="e.g. 20" required>
            </div>

            <div class="form-group">
                <label>Threshold Order Value (₹)</label>
                <input type="number" step="0.01" name="threshold" value="0">
            </div>

            <div class="form-group">
                <label>Maximum number of usage by single user</label>
                <input type="number" name="usage_limit" value="1">
            </div>

            <div class="form-group">
                <label>Expiry Date</label>
                <input type="date" name="expiry_date">
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 10px; padding-top: 1.5rem;">
                <input type="checkbox" name="is_active" id="isActive" checked style="width: 20px; height: 20px; cursor: pointer;">
                <label for="isActive" style="margin-bottom: 0; cursor: pointer;">Active</label>
            </div>
        </div>

        <div class="form-actions" style="margin-top: 3rem;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Create Coupon</button>
            <a href="{{ url_for('admin.coupons') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<style>
    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
    }
    .full-width { grid-column: span 2; }
    
    .form-group label {
        display: block;
        margin-bottom: 0.8rem;
        font-weight: 700;
        font-size: 0.95rem;
        color: #334155;
    }
    
    .form-group input, .form-group select {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        font-size: 1rem;
        outline: none;
        transition: all 0.2s;
    }
    
    .form-group input:focus, .form-group select:focus {
        border-color: #8b1a2a;
        box-shadow: 0 0 0 4px rgba(139, 26, 42, 0.05);
    }
</style>
{% endblock %}
